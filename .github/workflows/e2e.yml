name: e2e

# Runs on every commit to this bidder. Builds & runs the bidder against
# Postgres + Redis, then pulls the e2e suite from the private infra repo and
# runs it over HTTP. The TEST CONTENT is not in this repo — it lives in
# teads-sess-2026/infra (private) and is checked out at runtime using the
# E2E_SUITE_TOKEN secret, so students never see the tests.
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: summerschool
          POSTGRES_USER: bidder
          POSTGRES_PASSWORD: bidder
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      BIDDER_ID: teads-bidder
      BIDDER_URL: http://localhost:8080
      DATABASE_URL: postgresql://bidder:bidder@localhost:5432/summerschool
      REDIS_URL: redis://localhost:6379
      # Mapped so we can guard on it in `if:` (secrets aren't usable there directly).
      E2E_SUITE_TOKEN: ${{ secrets.E2E_SUITE_TOKEN }}
    steps:
      - uses: actions/checkout@v4 # this bidder

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build bidder
        run: ./mvnw -q -B -DskipTests package

      - name: Start bidder
        env:
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: bidder
          DB_PASSWORD: bidder
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: |
          # Kafka consumer disabled so startup doesn't wait on a broker we don't
          # run in CI; the HTTP bid path doesn't need it.
          java -jar target/summerschool-0.0.1-SNAPSHOT.jar \
            --spring.kafka.listener.auto-startup=false \
            > bidder.log 2>&1 &
          echo "started bidder pid $!"

      - name: Wait for bidder health
        run: |
          for i in $(seq 1 60); do
            if curl -sf "$BIDDER_URL/health" >/dev/null 2>&1; then
              echo "bidder healthy at $BIDDER_URL"; exit 0
            fi
            sleep 2
          done
          echo "::error::bidder did not become healthy at $BIDDER_URL"
          tail -n 150 bidder.log
          exit 1

      - name: Check e2e suite access
        if: env.E2E_SUITE_TOKEN == ''
        run: |
          echo "::error::Set the E2E_SUITE_TOKEN secret (a PAT with read access to"
          echo "::error::teads-sess-2026/infra) so CI can pull the private e2e suite."
          exit 1

      - name: Check out e2e suite (private)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.E2E_REPO || 'teads-sess-2026/infra' }}
          ref: ${{ vars.E2E_REF || 'main' }}
          path: e2e
          token: ${{ secrets.E2E_SUITE_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: e2e/bidder/go.sum

      - name: Run e2e suite
        working-directory: e2e/bidder
        run: make test

      - name: Bidder logs (on failure)
        if: failure()
        run: tail -n 200 bidder.log || true
