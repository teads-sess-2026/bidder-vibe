global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Bidders run on the host (not in Docker). host.docker.internal reaches the host
  # from inside the Prometheus container. Add/remove target ports as you run bidders.
  - job_name: bidders
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
          - host.docker.internal:8081
          - host.docker.internal:8082
          - host.docker.internal:8083
