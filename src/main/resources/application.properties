spring.application.name=summerschool

# ── Bidder identity ──────────────────────────────────────────────────────────
bidder.id=vibe
# Flat budget assigned to each creative (budget is tracked per creative, not per bidder).
bidder.creative-budget=25.0
bidder.timeout-ms=${BIDDER_TIMEOUT_MS:300}

# ── Strategy ─────────────────────────────────────────────────────────────────
# Wins are the leaderboard currency and this is a SECOND-PRICE auction, so the
# goal is to win as many eligible auctions as our budget allows — not to win each
# one by a wide margin. The previous multipliers overbid hard (essentially 0
# losses = we won everything we entered at inflated prices, exhausting budget
# early and then no-bidding most of the window). These are tuned down so we bid
# just above the observed market and lose the expensive marginal auctions cheaply.
bidder.strategy.min-samples=10
# Markup over floor before we have enough market samples. Just above floor.
bidder.strategy.cold-start-multiplier=1.02
bidder.strategy.window-size=50
# Markup over the observed clearing price once we have samples. Bid just enough
# to clear the market, not far above it.
bidder.strategy.market-multiplier=1.01
# premium-multiplier is retained for config compatibility but no longer applied:
# every win counts equally toward the score, so paying extra for "specific"
# inventory only spends budget faster. Pacing is the sole price modifier now.
bidder.strategy.premium-multiplier=1.0
# Pacing bounds the bid multiplier so budget burns EVENLY across the window: when
# under-pacing we bid up (win more, up to +boost), when over-pacing we bid down
# (win only cheap auctions, down to -cut) — a continuous, proportional response
# (multiplier = 1 + sensitivity * (timeElapsed% - budgetSpent%)). Widened from the
# old ±15/20% so pacing has real room to steer spend to the full window.
bidder.strategy.pacing-boost=1.50
bidder.strategy.pacing-cut=0.60
# How strongly the multiplier reacts to the pacing gap (gap is at most ±1). 1.0
# lets a large gap reach the full boost/cut range; lower = gentler steering.
bidder.strategy.pacing-sensitivity=1.0

# ── Competition timing ────────────────────────────────────────────────────────
# Pacing spreads each creative's budget across the window so we stay in the
# auction the whole time instead of front-loading spend and then no-bidding most
# of the run. Pacing is now ALWAYS ON: when start-time is empty it anchors to a
# Redis-persisted boot instant (stable across restarts), so a forgotten env var no
# longer silently disables pacing. start-time is an OPTIONAL override for when you
# know the true window start (ISO-8601 instant, e.g. 2026-06-01T09:00:00Z, or via a
# BIDDER_COMPETITION_START_TIME env var) — set it if the bidder boots before the
# window opens. Either way, match duration-seconds to the window length.
bidder.competition.start-time=${BIDDER_COMPETITION_START_TIME:}
bidder.competition.duration-seconds=${BIDDER_COMPETITION_DURATION_SECONDS:1800}

# ── Kafka (configure before competition) ─────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bidder-${bidder.id}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.properties.group.protocol=classic
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
kafka.topic.auction-notifications=ssp.auction-notifications

# ── Database (shared Postgres; each bidder isolated in its own schema) ────────
# Schema name is derived from bidder.id at startup: "bidder_" + sanitized id
# (e.g. team-alpha -> bidder_team_alpha). See SchemaInitializer / R2dbcConfig / SchemaBootstrap.
# DB_HOST lets a locally-running bidder point at the AWS-hosted Postgres (see config.prod.env).
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/summerschool
spring.r2dbc.username=${DB_USER:bidder}
spring.r2dbc.password=${DB_PASSWORD:bidder}
# Postgres is shared across all bidder teams — raise cautiously, not per-bidder-unbounded.
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=${R2DBC_POOL_MIN_SIZE:2}
spring.r2dbc.pool.max-size=${R2DBC_POOL_MAX_SIZE:50}

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.property-naming-strategy=SNAKE_CASE

# ── Redis (shared budget cache; REDIS_HOST points at the AWS-hosted Redis, see config.prod.env) ──
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT_MS:50}ms
# Lettuce multiplexes all commands onto ONE shared connection by default — under high
# concurrent request volume that connection's command queue backs up and commands miss
# bidder.timeout-ms, surfacing as RedisSystemException("Unknown redis exception").
# commons-pool2 on the classpath (pom.xml) makes Spring Boot auto-enable this pool.
spring.data.redis.lettuce.pool.max-active=64
spring.data.redis.lettuce.pool.max-idle=64
spring.data.redis.lettuce.pool.min-idle=16
spring.data.redis.lettuce.pool.max-wait=${REDIS_TIMEOUT_MS:50}ms

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.teads.summerschool.notification=DEBUG

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,beans,env,conditions
management.endpoint.health.show-details=always
