spring.application.name=summerschool

# ── Bidder identity ──────────────────────────────────────────────────────────
bidder.id=my-team
bidder.budget=100.0
# Flat budget assigned to each creative (budget is tracked per creative, not per bidder).
bidder.creative-budget=25.0
bidder.timeout-ms=100

# ── Strategy ─────────────────────────────────────────────────────────────────
bidder.strategy.min-samples=10
bidder.strategy.cold-start-multiplier=1.15
bidder.strategy.window-size=50
bidder.strategy.market-multiplier=1.05
bidder.strategy.premium-multiplier=1.5
bidder.strategy.pacing-boost=1.20
bidder.strategy.pacing-cut=0.85

# ── Competition timing (set before each run) ─────────────────────────────────
# ISO-8601 instant, e.g. 2026-06-01T09:00:00Z. Leave empty to disable pacing.
bidder.competition.start-time=
bidder.competition.duration-seconds=1800

# ── Kafka (configure before competition) ─────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bidder-${bidder.id}
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.properties.group.protocol=classic
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
kafka.topic.auction-notifications=ssp.auction-notifications

# ── Database (shared Postgres; each bidder isolated in its own schema) ────────
# Schema name is derived from bidder.id at startup: "bidder_" + sanitized id
# (e.g. team-alpha -> bidder_team_alpha). See SchemaInitializer / DatabaseConfig.
# DB_HOST lets remote bidders point at the SSP machine's Postgres (e.g. via Tailscale).
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/summerschool
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:bidder}
spring.datasource.password=${DB_PASSWORD:bidder}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

# ── Jackson ───────────────────────────────────────────────────────────────────
spring.jackson.property-naming-strategy=SNAKE_CASE

# ── Redis (shared budget cache; remote bidders point REDIS_HOST at the SSP's Redis) ──
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.teads.summerschool.notification=DEBUG

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,beans,env,conditions
management.endpoint.health.show-details=always
