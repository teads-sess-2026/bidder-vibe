# Infra (Postgres/Kafka/Redis/Prometheus/Grafana) lives in ssp/docker-compose.all.yml
# — start it there via `make run` in the ssp repo. This file only runs the bidder
# app itself, joining that stack's external network so "postgres"/"kafka"/"redis"
# resolve by service name.

services:

  bidder:
    build: .
    container_name: ss2026-bidder
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      BIDDER_ID: ${BIDDER_ID:-teads-bidder}
      DB_HOST: postgres
      REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
      # Pacing is DISABLED unless a start-time is set. Export these on the host before
      # `docker compose up` (e.g. BIDDER_COMPETITION_START_TIME=2026-06-01T09:00:00Z) so
      # the bidder spreads its budget evenly across the competition window.
      BIDDER_COMPETITION_START_TIME: ${BIDDER_COMPETITION_START_TIME:-}
      BIDDER_COMPETITION_DURATION_SECONDS: ${BIDDER_COMPETITION_DURATION_SECONDS:-1800}

networks:
  default:
    name: ss2026-net
    external: true
