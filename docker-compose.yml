# Infra (Postgres/Kafka/Redis/Prometheus/Grafana) lives in ssp/docker-compose.all.yml
# — start it there via `make run` in the ssp repo. This file only runs the bidder
# app itself, joining that stack's external network so "postgres"/"kafka"/"redis"
# resolve by service name.

services:

  bidder:
    build: .
    container_name: ss2026-bidder
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      BIDDER_ID: ${BIDDER_ID:-teads-bidder}
      DB_HOST: postgres
      REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8080
      # Pacing is always on: with no start-time it anchors to a Redis-persisted boot
      # instant (stable across restarts). start-time is an OPTIONAL override — export it
      # on the host before `docker compose up` (e.g.
      # BIDDER_COMPETITION_START_TIME=2026-06-01T09:00:00Z) only if the bidder boots before
      # the window opens. Match duration-seconds to the window length either way.
      BIDDER_COMPETITION_START_TIME: ${BIDDER_COMPETITION_START_TIME:-}
      BIDDER_COMPETITION_DURATION_SECONDS: ${BIDDER_COMPETITION_DURATION_SECONDS:-1800}

networks:
  default:
    name: ss2026-net
    external: true
